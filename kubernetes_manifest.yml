apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APPLICATION_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APPLICATION_NAME}
  template:
    metadata:
      labels:
        app: ${APPLICATION_NAME}
    spec:
      containers:
        - name: ${APPLICATION_NAME}
          image: ${CONTAINER_IMAGE_TAGGED}
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_URL
              value: ${DATABASE_URL}
            - name: NUXT_PUBLIC_USER_MANAGER_API_URL
              value: http://10.115.1.100:30097
            - name: NUXT_PUBLIC_OIDC_AUTHORITY
              value: http://10.115.1.100:30416/realms/jtekt
            - name: NUXT_PUBLIC_OIDC_CLIENT_ID
              value: gui
            - name: NUXT_PUBLIC_DEVELOPER
              value: Leah Ishiguro
            - name: NUXT_PUBLIC_DEVELOPER_HOMEPAGE
              value: http://10.115.1.14/leahishiguro
            - name: NUXT_APP_REPO
              value: http://10.115.1.14/eks/moreillon/skill_map_back
      imagePullSecrets:
        - name: ${K8S_ECR_SECRET_NAME}
---
apiVersion: v1
kind: Service
metadata:
  name: ${APPLICATION_NAME}
spec:
  type: NodePort
  selector:
    app: ${APPLICATION_NAME}
  ports:
    - port: 80
      nodePort: ${K8S_SERVICE_PORT}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${APPLICATION_NAME}
spec:
  ingressClassName: jtektrnd-net
  rules:
    - host: ${APPLICATION_NAME}.jtektrnd.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APPLICATION_NAME}
                port:
                  number: 80
